name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          # Backup our custom code
          cp pubspec.yaml pubspec.yaml.bak
          cp lib/main.dart lib/main.dart.bak
          
          # Force create the project to generate all missing config files (.metadata, android/, etc.)
          flutter create --project-name nepse_pro --platforms=android .
          
          # Restore our custom code
          mv pubspec.yaml.bak pubspec.yaml
          mv lib/main.dart.bak lib/main.dart
          
          # Delete the auto-generated test folder which references 'MyApp'
          rm -rf test/
          
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

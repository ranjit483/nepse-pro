name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          # Backup our custom code
          cp pubspec.yaml pubspec.yaml.bak
          cp lib/main.dart lib/main.dart.bak
          
          # Force create the project to generate all missing config files (.metadata, android/, etc.)
          flutter create --project-name nepse_pro --platforms=android .
          
          # Restore our custom code
          mv pubspec.yaml.bak pubspec.yaml
          mv lib/main.dart.bak lib/main.dart
          
          # Delete the auto-generated test folder which references 'MyApp'
          rm -rf test/
          
          # Inject INTERNET permission into AndroidManifest.xml for release mode
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' android/app/src/main/AndroidManifest.xml
          
          # Inject Deep Link Intent Filter for Supabase Email Verification
          python -c "
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f: data = f.read()
          intent_filter = '''
            <intent-filter>
                <action android:name=\"android.intent.action.VIEW\" />
                <category android:name=\"android.intent.category.DEFAULT\" />
                <category android:name=\"android.intent.category.BROWSABLE\" />
                <data android:scheme=\"io.supabase.nepsepro\" android:host=\"login-callback\" />
            </intent-filter>
          '''
          data = data.replace('</activity>', intent_filter + '</activity>')
          with open('android/app/src/main/AndroidManifest.xml', 'w') as f: f.write(data)
          "
          
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
